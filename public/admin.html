<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - tobacco Web</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { max-width: 1000px; margin: 20px auto; padding: 20px; background: #fff; border-radius: 12px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: 1px solid #ccc; background: #f9f9f9; }
        .tab-btn.active { background: #2c3e50; color: white; border-color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

<div class="topbar" style="background-color: #2c3e50;">
    <div class="logo" style="color: white;">🛡️ Admin <span>Dashboard</span></div>
    <div class="top-right">
        <button onclick="logoutAdmin()" style="background-color: #e74c3c;">ออกจากระบบแอดมิน</button>
    </div>
</div>

<div class="admin-container" id="dashboardSection" style="display: none;">
    <div>
        <button class="tab-btn active" onclick="switchAdminTab('usersTab', this)">👥 จัดการผู้ใช้งาน (Users)</button>
        <button class="tab-btn" onclick="switchAdminTab('scansTab', this)">📸 ข้อมูลภาพ AI (Admin Scans)</button>
    </div>

    <div id="usersTab" style="margin-top: 20px;">
        <h3>รายชื่อผู้ใช้งานระบบ</h3>
        <table id="usersTable">
            <thead>
                <tr>
                    <th>Email</th>
                    <th>Role</th>
                    <th>วันที่สมัคร</th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="scansTab" style="margin-top: 20px; display: none;">
        <h3>ประวัติภาพสแกนทั้งหมด (สำหรับฝึก AI)</h3>
        <table id="scansTable">
            <thead>
                <tr>
                    <th>ภาพ</th>
                    <th>โรคที่พบ</th>
                    <th>ความมั่นใจ</th>
                    <th>User ID (NULL = ลบไปแล้ว)</th>
                    <th>วันที่สแกน</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
    // ใส่ URL และ Key ของคุณ
    const supabaseUrl = 'https://bdzquuqxtmrrmgdtwdjq.supabase.co';
    const supabaseKey = 'sb_publishable_mqlTN61NRe9P67p33ES6ag_7yKtEXpx';
    const adminSupabase = supabase.createClient(supabaseUrl, supabaseKey);

    // ================= โค้ดส่วนระบบ Admin Authentication =================

    // ฟังก์ชันตรวจสอบสิทธิ์และเด้งหน้า
    async function checkAdminAuth() {
        console.log("🔒 กำลังตรวจสอบสิทธิ์ผู้ดูแลระบบ...");

        // 1. ตรวจสอบว่ามีผู้ใช้ล็อกอินอยู่หรือไม่
        const { data, error } = await adminSupabase.auth.getUser();

        if (error || !data?.user) {
            console.log("🚫 ไม่มีผู้ใช้ล็อกอิน เด้งกลับไปหน้าล็อกอิน");
            window.location.href = "login.html"; // Boot to login page
            return;
        }

        const loggedInUser = data.user;
        console.log(`👤 ผู้ใช้ล็อกอินอยู่: ${loggedInUser.email}`);

        // 2. ดึงข้อมูล Role จากตาราง users
        const { data: userData, error: roleError } = await adminSupabase
            .from('users')
            .select('role')
            .eq('id', loggedInUser.id)
            .single();

        if (roleError || !userData) {
            console.error("❌ เกิดข้อผิดพลาดในการดึงสิทธิ์:", roleError);
            alert("❌ ไม่สามารถตรวจสอบสิทธิ์ได้ กรุณาล็อกอินใหม่");
            await adminSupabase.auth.signOut();
            window.location.href = "login.html";
            return;
        }

        // 3. ตรวจสอบ Role
        if (userData.role === 'admin') {
            console.log("✅ ยืนยันสิทธิ์แอดมิน แสดงหน้า Dashboard");
            // แสดงหน้า Dashboard และโหลดข้อมูล
            document.getElementById('dashboardSection').style.display = 'block'; 
            loadUsers();
            loadAdminScans();
        } else {
            console.log("🚫 ผู้ใช้ไม่ใช่แอดมิน เด้งกลับไปหน้าแรก");
            alert("❌ คุณไม่มีสิทธิ์เข้าถึงหน้านี้");
            window.location.href = "index.html"; // Redirect normal users to user homepage
        }
    }

    // เรียกใช้ฟังก์ชันตรวจสอบสิทธิ์เมื่อหน้าเว็บโหลดเสร็จ
    window.addEventListener('DOMContentLoaded', checkAdminAuth);

    // ================= โค้ดส่วนระบบจัดการข้อมูล (Helper Functions) =================

    // 2. โหลดรายชื่อ Users
    async function loadUsers() {
        const { data, error } = await adminSupabase.from('users').select('*');
        const tbody = document.querySelector('#usersTable tbody');
        tbody.innerHTML = '';

        if (data) {
            data.forEach(u => {
                tbody.innerHTML += `
                    <tr>
                        <td>${u.email}</td>
                        <td><b>${u.role}</b></td>
                        <td>${new Date(u.created_at).toLocaleDateString('th-TH')}</td>
                        <td>
                            <button onclick="changeRole('${u.id}', '${u.role === 'admin' ? 'user' : 'admin'}')">สลับสิทธิ์</button>
                            <button onclick="deleteUser('${u.id}')" style="background: red; color: white;">ลบผู้ใช้</button>
                        </td>
                    </tr>
                `;
            });
        }
    }

    // 3. โหลดภาพจากตาราง admin_scans
    async function loadAdminScans() {
        const { data, error } = await adminSupabase.from('admin_scans').select('*').order('created_at', { ascending: false });
        const tbody = document.querySelector('#scansTable tbody');
        tbody.innerHTML = '';

        if (data) {
            data.forEach(s => {
                tbody.innerHTML += `
                    <tr>
                        <td><img src="${s.admin_image_url}" width="80" style="border-radius:5px;"></td>
                        <td>${s.disease}</td>
                        <td>${s.confidence}</td>
                        <td style="color: ${s.user_id ? 'black' : 'red'};">${s.user_id ? s.user_id : 'Anonymous (ถูกลบ)'}</td>
                        <td>${new Date(s.created_at).toLocaleDateString('th-TH')}</td>
                    </tr>
                `;
            });
        }
    }

    // 4. เปลี่ยนสิทธิ์ (Role)
    async function changeRole(userId, newRole) {
        if(confirm(`ต้องการเปลี่ยนสิทธิ์เป็น ${newRole} ใช่หรือไม่?`)){
            await adminSupabase.from('users').update({ role: newRole }).eq('id', userId);
            loadUsers();
        }
    }

    // 5. ลบ User แบบถอนรากถอนโคน (ลบรูปใน Storage + ลบประวัติ + เก็บสถิติ Admin)
async function deleteUser(userId) {
    if (!confirm('🚨 คำเตือน: หากลบผู้ใช้นี้ ประวัติและรูปภาพทั้งหมดในฝั่ง User จะถูกลบถาวร! แต่ข้อมูลในฝั่ง Admin จะถูกเก็บไว้เป็นสถิติ (แบบไม่ระบุตัวตน) ยืนยันการดำเนินการ?')) {
        return;
    }

    try {
        console.log("⏳ กำลังเริ่มกระบวนการลบข้อมูลของ User:", userId);

        // --- STEP 1: ดึงรายการรูปภาพทั้งหมดของ User นี้จากตาราง scans ---
        const { data: userScans, error: fetchError } = await adminSupabase
            .from('scans')
            .select('image_url')
            .eq('user_id', userId);

        if (fetchError) throw fetchError;

        // --- STEP 2: ไล่ลบไฟล์ใน Storage (history_images) ---
        if (userScans && userScans.length > 0) {
            console.log(`📸 พบรูปภาพทั้งหมด ${userScans.length} รูป กำลังไล่ลบ...`);
            
            const fileNamesToDelete = userScans.map(scan => {
                const urlParts = scan.image_url.split('/');
                return decodeURIComponent(urlParts[urlParts.length - 1]);
            });

            const { error: storageError } = await adminSupabase
                .storage
                .from('history_images')
                .remove(fileNamesToDelete);

            if (storageError) console.warn("⚠️ บางรูปอาจลบไม่สำเร็จใน Storage:", storageError.message);
        }

        // --- STEP 3: ลบประวัติในตาราง scans (ฝั่ง User) ---
        const { error: deleteScansError } = await adminSupabase
            .from('scans')
            .delete()
            .eq('user_id', userId);
        
        if (deleteScansError) throw deleteScansError;

        // --- STEP 4: ทำให้ข้อมูลใน admin_scans เป็น Anonymous (NULL) ---
        // (เนื่องจากเราตั้ง SQL ไว้ว่า ON DELETE SET NULL ขั้นตอนนี้จะทำงานอัตโนมัติเมื่อลบ User)
        // แต่เราสั่ง Update เพื่อความชัวร์ในกรณีที่ไม่ได้ตั้งค่าไว้
        await adminSupabase
            .from('admin_scans')
            .update({ user_id: null })
            .eq('user_id', userId);

        // --- STEP 5: ลบรายชื่อออกจากตาราง users ---
        const { error: deleteUserError } = await adminSupabase
            .from('users')
            .delete()
            .eq('id', userId);

        if (deleteUserError) throw deleteUserError;

        alert('✅ ลบข้อมูลผู้ใช้ ประวัติ และรูปภาพใน Storage เรียบร้อยแล้ว!');
        loadUsers();
        loadAdminScans();

    } catch (error) {
        console.error("❌ เกิดข้อผิดพลาดในกระบวนการลบ:", error);
        alert("เกิดข้อผิดพลาด: " + error.message);
    }
}

    // ฟังก์ชันสลับ Tab
    function switchAdminTab(tabId, el) {
        document.getElementById('usersTab').style.display = 'none';
        document.getElementById('scansTab').style.display = 'none';
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(tabId).style.display = 'block';
        el.classList.add('active');
    }

    function logoutAdmin() {
        adminSupabase.auth.signOut();
        window.location.href = "login.html"; // Redirect to normal login page after admin logout
    }
</script>
</body>
</html>
